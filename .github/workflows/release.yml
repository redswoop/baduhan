name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}
      - name: Build release
        run: cargo build --release
      - name: Package
        shell: pwsh
        run: |
          $zip = "baduhan-${{ github.ref_name }}-windows-${{ matrix.arch }}.zip"
          Compress-Archive -Path target/release/baduhan.exe, README.md, LICENSE -DestinationPath $zip
          Get-FileHash $zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $zip" } | Out-File -Encoding ascii "$zip.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            baduhan-*.zip
            baduhan-*.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            baduhan-*.zip
            baduhan-*.zip.sha256

  # Bump bucket/baduhan.json in redswoop/scoop-bucket to this tag's version +
  # hashes. Requires a PAT with contents:write on scoop-bucket in the
  # TAP_GITHUB_TOKEN secret (same secret xfer uses; the default GITHUB_TOKEN
  # cannot push to other repositories).
  publish-scoop:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
      - name: Update bucket manifest
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "::warning::TAP_GITHUB_TOKEN not set — skipping scoop manifest bump."
            echo "Add a PAT (contents:write on redswoop/scoop-bucket) as the"
            echo "TAP_GITHUB_TOKEN repo secret to enable automatic bucket updates."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          X64_HASH=$(cut -d' ' -f1 "baduhan-${GITHUB_REF_NAME}-windows-x64.zip.sha256")
          ARM64_HASH=$(cut -d' ' -f1 "baduhan-${GITHUB_REF_NAME}-windows-arm64.zip.sha256")
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/redswoop/scoop-bucket.git"
          cd scoop-bucket
          jq --arg v "$VERSION" --arg x64 "$X64_HASH" --arg arm64 "$ARM64_HASH" '
            .version = $v
            | .architecture["64bit"].url = "https://github.com/redswoop/baduhan/releases/download/v\($v)/baduhan-v\($v)-windows-x64.zip"
            | .architecture["64bit"].hash = $x64
            | .architecture.arm64.url = "https://github.com/redswoop/baduhan/releases/download/v\($v)/baduhan-v\($v)-windows-arm64.zip"
            | .architecture.arm64.hash = $arm64
          ' bucket/baduhan.json > baduhan.json.new
          mv baduhan.json.new bucket/baduhan.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/baduhan.json
          git diff --cached --quiet && { echo "Manifest already up to date."; exit 0; }
          git commit -m "baduhan: update to version ${VERSION}"
          git push
